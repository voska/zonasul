version: 2

builds:
  - main: ./cmd/zonasul
    binary: zonasul
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

brews:
  - name: zonasul
    homepage: "https://github.com/voska/zonasul"
    description: "Zona Sul supermarket CLI for AI agents"
    license: "MIT"
    repository:
      owner: voska
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: voska-bot
      email: bot@voska.dev
    install: |
      bin.install "zonasul"
    test: |
      system "#{bin}/zonasul", "agent", "exit-codes", "--json"
